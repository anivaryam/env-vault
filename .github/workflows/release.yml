name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            target: bun-linux-arm64
            goos: linux
            goarch: arm64
          - os: macos-latest
            target: bun-darwin-x64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            target: bun-darwin-arm64
            goos: darwin
            goarch: arm64
          - os: windows-latest
            target: bun-windows-x64
            goos: windows
            goarch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile binary
        run: |
          bun build ./bin/env-vault.js --compile --target=${{ matrix.target }} --outfile=env-vault

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          mkdir -p dist
          tar -czf dist/env-vault_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz env-vault

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p dist
          mv env-vault.exe env-vault.exe 2>/dev/null || true
          7z a dist/env-vault_windows_amd64.zip env-vault.exe

      - uses: actions/upload-artifact@v4
        with:
          name: env-vault_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
